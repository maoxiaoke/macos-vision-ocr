name: Release Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Build Platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - arm64
          - x86_64
      version:
        description: 'Version (e.g. v1.0.0)'
        required: true
        type: string
        default: 'v1.0.0'

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build for arm64
        if: github.event.inputs.platform == 'arm64' || github.event.inputs.platform == 'all'
        run: |
          swift build -c release --arch arm64
          mkdir -p dist
          cp .build/release/ocr dist/ocr-arm64
          cd dist && zip ocr-macos-arm64-${{ github.event.inputs.version }}.zip ocr-arm64

      - name: Build for x86_64
        if: github.event.inputs.platform == 'x86_64' || github.event.inputs.platform == 'all'
        run: |
          swift build -c release --arch x86_64
          mkdir -p dist
          cp .build/release/ocr dist/ocr-x86_64
          cd dist && zip ocr-macos-x86_64-${{ github.event.inputs.version }}.zip ocr-x86_64

      - name: Create Universal Binary
        if: github.event.inputs.platform == 'all'
        run: |
          lipo -create dist/ocr-arm64 dist/ocr-x86_64 -output dist/ocr
          cd dist && zip ocr-macos-universal-${{ github.event.inputs.version }}.zip ocr

      - name: Generate SHA256 checksums
        run: |
          cd dist
          shasum -a 256 *.zip > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          files: |
            dist/ocr-macos-*-${{ github.event.inputs.version }}.zip
            dist/checksums.txt
